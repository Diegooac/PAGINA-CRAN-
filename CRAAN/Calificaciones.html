<!DOCTYPE html>
<html>
<head>
    <title>Lista</title>
</head>
<body>

<h2>Calificaciones Registradas</h2>
<div id="clima-info" style="background: #f0f4f8; border: 1px solid #d1d9e0; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-family: Arial, sans-serif;">
    <strong>Estado del clima en Neza:</strong> 
    <span id="temp">Cargando...</span> | 
    <span id="desc">--</span>
</div>

<button type="button" onclick="window.location.href='index.html'">Agregar Otro</button>

<ul id="lista"></ul>

<script src="js/lib/consume.js"></script>
<script>
consume("php/obtener.php", (data) => {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(d => {
        lista.innerHTML += `
        <li id="fila-${d.id}">
            ${d.nombre} ${d.apellidop} - ${d.materia}: <b>${d.calificacion}</b>
            <button onclick="prepararEdicion(${d.id})">Editar</button>
            <button onclick="confirmarEliminacion(${d.id})" >Eliminar</button>
        </li>`;
    });
});

// Función para Redirigir a Edición
function prepararEdicion(id) {
    window.location.href = `editar_alumno.html?id=${id}`;
}

// Función para Eliminar
function confirmarEliminacion(id) {
    if (confirm("¿Estás seguro de que quieres eliminar este registro?")) {
        fetch("php/eliminar.php?id=" + id)
        .then(res => res.json())
        .then(res => {
            alert(res.mensaje);
            if(res.status === "ok") {
                document.getElementById("fila-" + id).remove();
            }
        });
    }
}
</script>

<script>

const ciudad = "Nezahualcoyotl";
const apiKey = "709282363e7906963496030c6a5a3a79"; 
const urlClima = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(ciudad)},mx&units=metric&lang=es&appid=${apiKey}`;

fetch(urlClima)
    .then(response => {
        return response.json();
    })
    .then(data => {
        console.log("JSON recibido de la API:", data);
        
        const temperatura = data.main.temp;
        const climaDescripcion = data.weather[0].description;

        document.getElementById("temp").innerText = temperatura + "°C";
        document.getElementById("desc").innerText = climaDescripcion.toUpperCase();
    })
    .catch(err => {
        console.error("Error al consumir la API de clima:", err);
        document.getElementById("temp").innerText = "Error al conectar";
    });
</script>

</body>
</html>
