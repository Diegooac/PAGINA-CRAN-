<!DOCTYPE html>
<html>
<head>
    <title>Editar Alumno</title>
</head>
<body>

<h2>Editar Calificacion</h2>

<form id="formulario">
    <input type="hidden" name="id" id="input_id">
    
    Nombre: <input type="text" name="nombre" id="nombre" required><br>
    Apellido Paterno: <input type="text" name="apellidop" id="apellidop" required><br>
    Apellido Materno: <input type="text" name="apellidom" id="apellidom" required><br>
    Materia: <input type="text" name="materia" id="materia" required><br>
    Calificacion: <input type="number" step="0.1" name="calificacion" id="calificacion" required><br>

    <button type="submit">Actualizar Cambios</button>
    <button type="button" onclick="window.location.href='Calificaciones.html'">Cancelar</button>
</form>

<p id="mensaje"></p>

<script src="js/lib/enviaFormRecibeJson.js"></script>
<script>
    // 1. Obtener el ID de la URL (ej: editar_alumno.html?id=5)
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    if (id) {
        document.getElementById('input_id').value = id;
        
        // 2. Cargar los datos actuales del alumno para rellenar el formulario
        fetch(`php/obtener_uno.php?id=${id}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('nombre').value = data.nombre;
                document.getElementById('apellidop').value = data.apellidop;
                document.getElementById('apellidom').value = data.apellidom;
                document.getElementById('materia').value = data.materia;
                document.getElementById('calificacion').value = data.calificacion;
            });
    }

    // 3. Enviar la actualización
    document.getElementById("formulario").addEventListener("submit", function(e){
        e.preventDefault();
        enviaFormRecibeJson("php/actualizar.php", this, (res) => {
            alert(res.mensaje);
            if(res.status === "ok") {
                window.location.href = 'Calificaciones.html';
            }
        });
    });
</script>

</body>
</html>
